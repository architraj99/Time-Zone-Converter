<!DOCTYPE html>
<html>
<head>
    <title>Time Zone Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Time Zone Converter</h1>

        <p>This tool converts time between different countries.</p>

        <hr>

        <div class="row">

            <div class="section">
                <h2>'From' Time Zone</h2>

                <label>Choose Time Zone</label>
                <br>
                <select id="fromZone">
                    <option value="Asia/Kolkata">India</option>
                    <option value="America/New_York">USA - New York</option>
                    <option value="America/Chicago">USA - Chicago</option>
                    <option value="America/New_York">USA - Vermont (Eastern Time)</option>
                    <option value="Europe/London">UK - London</option>
                    <option value="Europe/Paris">France - Paris</option>
                    <option value="Europe/Berlin">Germany - Berlin</option>
                    <option value="Europe/Amsterdam">Netherlands (Amsterdam)</option>
                    <option value="Asia/Dubai">UAE - Dubai</option>
                    <option value="Asia/Tokyo">Japan - Tokyo</option>
                    <option value="Asia/Singapore">Singapore</option>
                    <option value="Australia/Sydney">Australia - Sydney</option>
                </select>

                <br><br>

                <label>Date</label>
                <br>
                <input type="date" id="date">

                <br><br>

                <label>Time</label>
                <br>
                <input type="time" id="time">
            </div>

            <div class="section">
                <h2>To Time Zone</h2>

                <label>Choose Time Zone</label>
                <br>
                <select id="toZone">
                    <option value="Asia/Kolkata">India</option>
                    <option value="America/New_York">USA - New York</option>
                    <option value="America/Chicago">USA - Chicago</option>
                    <option value="America/New_York">USA - Vermont (Eastern Time)</option>
                    <option value="Europe/London">UK - London</option>
                    <option value="Europe/Paris">France - Paris</option>
                    <option value="Europe/Berlin">Germany - Berlin</option>
                    <option value="Europe/Amsterdam">Netherlands (Amsterdam)</option>
                    <option value="Asia/Dubai">UAE - Dubai</option>
                    <option value="Asia/Tokyo">Japan - Tokyo</option>
                    <option value="Asia/Singapore">Singapore</option>
                    <option value="Australia/Sydney">Australia - Sydney</option>
                </select>
            </div>

        </div>

        <div class="action-box">
            <button onclick="convertTime()">Convert</button>
            <button onclick="useCurrentTime()">Use Current Time</button>
            <button onclick="swapZones()">Swap</button>
            <button onclick="resetAll()">Reset</button>
        </div>

        <div class="result-box">
            <h2>Result</h2>
            <p id="resultMessage">No conversion done yet.</p>

            <div class="summary">
                <p><b>From:</b> <span id="fromName">-</span></p>
                <p><b>To:</b> <span id="toName">-</span></p>
                <p><b>Original:</b> <span id="originalTime">-</span></p>
                <p><b>Converted:</b> <span id="convertedTime">-</span></p>
            </div>
        </div>

        <div class="history-box">
            <h2>Last Conversion</h2>
            <p id="historyText">Nothing Converted Yet.</p>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
